<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Live Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  #map { height: 100vh; }
  #controls {
    position: absolute;
    top: 10px;
    left: 80px; /* avoids Leaflet zoom buttons */
    z-index: 1000;
    background: white;
    padding: 10px;
    border-radius: 5px;
    width: 260px;
  }
  #search { width: 100%; padding: 5px; }
  #suggestions {
    border: 1px solid #ccc;
    max-height: 120px;
    overflow-y: auto;
    background: white;
    margin-top: 2px;
  }
  .suggestion-item {
    padding: 5px;
    cursor: pointer;
  }
  .suggestion-item:hover { background: #eee; }
  #eta, #standardAddress { margin-top: 5px; font-size: 0.9em; }
  #recenterBtn { margin-top: 5px; width: 100%; }
</style>
</head>
<body>

<div id="controls">
  <input type="text" id="search" placeholder="Enter destination" autocomplete="off"/>
  <div id="suggestions"></div>
  <button id="goBtn">Go</button>
  <button id="toggleFollow">Follow Me: ON</button>
  <button id="recenterBtn">Recenter on Me</button>
  <div id="standardAddress"></div>
  <div id="eta"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const ORS_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImUwMDJjNzVjMThhOTRiMTJiNDAzZjgwMjQzMWQ3ZWVjIiwiaCI6Im11cm11cjY0In0=";

let followUser = true;
let userMarker = null;
let destinationMarker = null;
let routeLayer = null;
let lastPosition = null;

// Initialize map
const map = L.map('map').setView([43.7, -79.4], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

// Follow toggle
document.getElementById("toggleFollow").addEventListener("click", () => {
  followUser = !followUser;
  document.getElementById("toggleFollow").innerText = `Follow Me: ${followUser ? "ON" : "OFF"}`;
});

// Recenter button
document.getElementById("recenterBtn").addEventListener("click", () => {
  if(lastPosition) map.setView(lastPosition, map.getZoom());
});

// Watch user location
navigator.geolocation.watchPosition(function(pos){
  const latlng = [pos.coords.latitude, pos.coords.longitude];
  lastPosition = latlng;

  if(!userMarker) userMarker = L.marker(latlng).addTo(map).bindPopup("You are here").openPopup();
  else userMarker.setLatLng(latlng);

  if(followUser) map.setView(latlng, map.getZoom());

  if(destinationMarker) updateRoute();
}, console.error, { enableHighAccuracy: true });

// Autocomplete
const searchInput = document.getElementById("search");
const suggestionsDiv = document.getElementById("suggestions");
const standardAddressDiv = document.getElementById("standardAddress");

searchInput.addEventListener("input", async () => {
  const query = searchInput.value;
  suggestionsDiv.innerHTML = "";
  standardAddressDiv.innerText = "";

  if(!query) return;

  try {
    const res = await fetch(`https://api.openrouteservice.org/geocode/autocomplete?api_key=${ORS_KEY}&text=${encodeURIComponent(query)}`);
    if(!res.ok) throw new Error(`HTTP error ${res.status}`);
    const data = await res.json();
    if(!data.features) return;

    data.features.slice(0,5).forEach(f => {
      const item = document.createElement("div");
      item.className = "suggestion-item";
      item.innerText = f.properties.label;
      item.onclick = () => selectSuggestion(f);
      suggestionsDiv.appendChild(item);
    });
  } catch(e) {
    console.error("Error fetching suggestions:", e);
  }
});

function selectSuggestion(feature){
  const [lng, lat] = feature.geometry.coordinates;

  if(destinationMarker) destinationMarker.setLatLng([lat,lng]);
  else destinationMarker = L.marker([lat,lng], {color:'red'}).addTo(map).bindPopup("Destination").openPopup();

  updateRoute();
  standardAddressDiv.innerText = feature.properties.label; // show ORS address without overwriting input
  suggestionsDiv.innerHTML = "";
}

// Go button
document.getElementById("goBtn").addEventListener("click", async () => {
  const query = searchInput.value;
  if(!query) return;

  try {
    const res = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${ORS_KEY}&text=${encodeURIComponent(query)}`);
    if(!res.ok) throw new Error(`HTTP error ${res.status}`);
    const data = await res.json();
    if(!data.features || data.features.length===0){ alert("Location not found"); return; }

    selectSuggestion(data.features[0]);
  } catch(e) {
    console.error("Error fetching destination:", e);
  }
});

// Draw route and ETA
async function updateRoute() {
  if(!lastPosition || !destinationMarker) return;

  const coords = [
    [lastPosition[1], lastPosition[0]],
    [destinationMarker.getLatLng().lng, destinationMarker.getLatLng().lat]
  ];

  try {
    const res = await fetch(`https://api.openrouteservice.org/v2/directions/driving-car/json`, {
      method: "POST",
      headers: { "Authorization": ORS_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ coordinates: coords })
    });

    if(!res.ok) throw new Error(`HTTP error ${res.status}`);
    const data = await res.json();
    if(!data.features || !data.features[0]) return;

    const routeCoords = data.features[0].geometry.coordinates.map(c => [c[1],c[0]]);

    if(routeLayer) map.removeLayer(routeLayer);
    routeLayer = L.polyline(routeCoords,{color:'blue'}).addTo(map);

    const seconds = data.features[0].properties.segments[0].duration;
    const mins = Math.round(seconds/60);
    document.getElementById("eta").innerText = `Estimated arrival: ~${mins} min`;
  } catch(e) {
    console.error("Error fetching route:", e);
  }
}
</script>
</body>
</html>
