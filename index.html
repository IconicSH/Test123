<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Navigation</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html,body{
margin:0;
height:100%;
}

#map{
height:100%;
}

#searchBox{
position:absolute;
top:15px;
left:80px;
z-index:1000;
background:white;
padding:6px;
border-radius:6px;
box-shadow:0 2px 5px rgba(0,0,0,0.3);
}

#suggestions{
background:white;
max-height:200px;
overflow:auto;
}

.suggestion{
padding:4px;
cursor:pointer;
}

.suggestion:hover{
background:#eee;
}

#stats{
position:absolute;
bottom:10px;
left:10px;
background:white;
padding:8px;
border-radius:6px;
z-index:1000;
}
</style>
</head>

<body>

<div id="searchBox">
<input id="search" placeholder="Search destination">
<div id="suggestions"></div>
</div>

<div id="stats">
Speed: <span id="speed">0</span> km/h<br>
ETA: <span id="eta">-</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const ORS_KEY="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImUwMDJjNzVjMThhOTRiMTJiNDAzZjgwMjQzMWQ3ZWVjIiwiaCI6Im11cm11cjY0In0="

let map=L.map('map').setView([0,0],15)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

let userMarker=null
let routeLine=null
let destination=null

let lastPos=null
let lastTime=null

function updateSpeed(lat,lng){

let now=Date.now()

if(lastPos){

let dist=map.distance(lastPos,[lat,lng])

let dt=(now-lastTime)/1000

let speed=(dist/dt)*3.6

document.getElementById("speed").innerText=speed.toFixed(1)

}

lastPos=[lat,lng]
lastTime=now
}

function updateLocation(pos){

let lat=pos.coords.latitude
let lng=pos.coords.longitude

updateSpeed(lat,lng)

if(!userMarker){
userMarker=L.marker([lat,lng]).addTo(map)
map.setView([lat,lng],16)
}else{
userMarker.setLatLng([lat,lng])
}

if(destination){
checkReroute([lat,lng])
}

}

function requestLocation(){

navigator.geolocation.getCurrentPosition(

function(pos){

updateLocation(pos)

navigator.geolocation.watchPosition(updateLocation)

},

function(err){

alert("Location permission required")

},

{
enableHighAccuracy:true
}

)

}

requestLocation()

async function searchPlaces(q){

let url=`https://api.openrouteservice.org/geocode/autocomplete?api_key=${ORS_KEY}&text=${encodeURIComponent(q)}`

try{
let res=await fetch(url)

let data=await res.json()

let box=document.getElementById("suggestions")

box.innerHTML=""

data.features.forEach(f=>{

let d=document.createElement("div")

d.className="suggestion"

d.innerText=f.properties.label

d.onclick=()=>{

destination=f.geometry.coordinates.reverse()

box.innerHTML=""

drawRoute()

}

box.appendChild(d)

})

}catch(e){
console.error("Autocomplete failed",e)
}

}

document.getElementById("search").addEventListener("input",e=>{

let q=e.target.value

if(q.length<2) return

searchPlaces(q)

})

async function drawRoute(){

if(!userMarker) return

let start=userMarker.getLatLng()

let url="https://api.openrouteservice.org/v2/directions/driving-car/geojson"

let body={
coordinates:[
[start.lng,start.lat],
[destination[1],destination[0]]
]
}

let res=await fetch(url,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":ORS_KEY
},
body:JSON.stringify(body)
})

let data=await res.json()

let coords=data.features[0].geometry.coordinates.map(c=>[c[1],c[0]])

if(routeLine) map.removeLayer(routeLine)

routeLine=L.polyline(coords,{color:"blue"}).addTo(map)

let duration=data.features[0].properties.summary.duration

let mins=Math.round(duration/60)

document.getElementById("eta").innerText=mins+" min"

}

function checkReroute(current){

if(!routeLine) return

let latlngs=routeLine.getLatLngs()

let closest=Infinity

latlngs.forEach(p=>{

let d=map.distance(current,p)

if(d<closest) closest=d

})

if(closest>40){
drawRoute()
}

}

function recenter(){

if(userMarker){
map.setView(userMarker.getLatLng(),16)
}

}

let recenterBtn=L.control({position:'bottomright'})

recenterBtn.onAdd=function(){

let btn=L.DomUtil.create('button')

btn.innerHTML="Center"

btn.style.padding="6px"

btn.onclick=recenter

return btn

}

recenterBtn.addTo(map)

</script>

</body>
</html>
